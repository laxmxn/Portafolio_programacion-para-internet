<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Multimedia</title>
    <link rel="stylesheet" href="diseno.css">
    <link rel="stylesheet" href="../../estilos.css">
         <script src="http://maps.google.com/maps/api/js?sensor=false"></script>
     <script>
      var x = document.getElementById("demo");
      function getLocation() {
          if (navigator.geolocation) {
              navigator.geolocation.getCurrentPosition(showPosition, showError);
          } else {
              x.innerHTML = "Su navegador no soporta geolocalización.";
          }
      }

      function showPosition(position) {
          lat = position.coords.latitude;
          lon = position.coords.longitude;
          latlon = new google.maps.LatLng(lat, lon)
          mapholder = document.getElementById('mapholder')
          mapholder.style.height = '250px';
          mapholder.style.width = '500px';

          var myOptions = {
              center:latlon,zoom:14,
              mapTypeId:google.maps.MapTypeId.ROADMAP,
              mapTypeControl:false,
              navigationControlOptions: {
                style:google.maps.NavigationControlStyle.SMALL
              }
          }

          var map = new google.maps.Map(document.getElementById("mapholder"), myOptions);
          var marker = new google.maps.Marker({
            position:latlon,
            map:map,
            title:"¡Aquí esta!"
          });
      }

      function showError(error) {
          switch(error.code) {
              case error.PERMISSION_DENIED:
                  x.innerHTML = "El usuario declinó la petición de Geolocalización."
                  break;
              case error.POSITION_UNAVAILABLE:
                  x.innerHTML = "La información de geolocalización no está disponible."
                  break;
              case error.TIMEOUT:
                  x.innerHTML = "La petición del usuario rebasó el tiempo de espera."
                  break;
              case error.UNKNOWN_ERROR:
                  x.innerHTML = "Error desconocido."
                  break;
          }
      }
    </script>
</head>
<body>
    <h1>Ejemplo de video</h1>
    <div class="center">
        <video src="video.mp4" width="900"  autoplay muted loop>
            Tu navegador no soporta el elemento de video.

    </div>

    </div>
   <div class="center">

    <h1>Geolocalización</h1>
    <div class="center">
        <p id="demo">Presione el botón para obtener su ubicación.</p>
            <button style="background-color: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;" onclick="getLocation()">Presionar</button>
